name: build-chrome

on:
  workflow_dispatch:
  push:
    branches:
      - manifest-v3
  pull_request:
    branches:
      - manifest-v3

jobs:
  build-chrome:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository to the runner
        uses: actions/checkout@v4

      - name: Setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Build Chrome addon
        run: npm run build.chrome

      - name: Upload Chrome addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidebery-chrome-addon
          path: addon
          if-no-files-found: error
