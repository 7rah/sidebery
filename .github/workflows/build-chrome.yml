name: build-chrome

on:
  workflow_dispatch:
  push:
    branches:
      - manifest-v3
    tags:
      - 'v*'
  pull_request:
    branches:
      - manifest-v3

permissions:
  contents: write

jobs:
  build-chrome:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository to the runner
        uses: actions/checkout@v4

      - name: Setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Build Chrome addon
        run: npm run build.chrome

      - name: Package Chrome addon
        run: |
          mkdir -p dist
          cd addon
          zip -r "../dist/sidebery-chrome-${GITHUB_REF_NAME}.zip" .

      - name: Upload Chrome addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidebery-chrome-addon
          path: dist/sidebery-chrome-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Upload Chrome release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sidebery-chrome-${{ github.ref_name }}.zip
